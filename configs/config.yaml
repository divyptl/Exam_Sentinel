model:
  backbone: "efficientnet_b3"
  img_size: 256
  num_heads: 4
  srm_filters: 30
  bayar_channels: 3
  dropout: 0.3
  mixed_precision: true

training:
  batch_size: 16
  lr: 0.0001
  epochs: 30
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 3
  grad_clip: 1.0
  num_workers: 4

inference:
  interval_seconds: 5
  confidence_threshold: 0.65
  device: "cuda"

decision_engine:
  green_threshold: 0.65
  yellow_threshold: 0.72
  orange_threshold: 0.82
  red_threshold: 0.91
  sustained_gaze_seconds: 3.5
  consecutive_flags_for_red: 3

gaze:
  off_screen_threshold_deg: 30
  blink_rate_min: 0.1
  sustained_window_frames: 21

dashboard:
  port: 8501
  update_interval_ms: 500
  log_path: "logs/events.jsonl"
  max_log_lines: 10000

paths:
  weights_dir: "models/weights"
  log_dir: "logs"
  data_dir: "data"
  demo_dir: "data/demo"
